# Render blueprint — backend web service + managed Postgres.
# Connect this repo in the Render dashboard ("New + → Blueprint"); it reads this
# file. Then set the secret env vars (marked sync:false) in the dashboard.
#
# See docs/DEPLOY_CLOUD.md for the full step-by-step.
services:
  - type: web
    name: agentforge-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # --- required: your LLM key(s) ---
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # --- stable secret for JWTs + DB secret encryption (auto-generated) ---
      - key: SECRET_KEY
        generateValue: true
      # --- durable Postgres (from the database below) ---
      - key: DATABASE_URL
        fromDatabase:
          name: agentforge-db
          property: connectionString
      # --- Chroma/vector scratch dir (ephemeral; structured data is in Postgres) ---
      - key: AGENTFORGE_DATA_DIR
        value: /tmp/agentforge
      # --- set these to your real URLs after the first deploy ---
      - key: FRONTEND_ORIGIN
        sync: false   # e.g. https://agentforge.vercel.app
      - key: OAUTH_REDIRECT_URI
        sync: false   # e.g. https://agentforge-backend.onrender.com/api/connections/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # --- admin console (change from the dj/dj default!) ---
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: agentforge-db
    plan: free
