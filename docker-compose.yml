# =====================================================================
#  AgentFury — one-command deployment.
#
#    1. Put your GROQ_API_KEY in backend/.env (copy backend/.env.example)
#    2. docker compose up --build
#    3. open http://localhost:8000
#
#  The single container builds the frontend, runs the API, and serves the
#  UI together on port 8000. SQLite + Chroma data persist in the named
#  volume so nothing is lost across restarts.
# =====================================================================
services:
  agentforge:
    build: .
    image: agentforge:latest
    ports:
      - "8000:8000"
    env_file:
      - backend/.env          # GROQ_API_KEY, GOOGLE_CLIENT_ID, etc.
    environment:
      # In one-container mode the UI is same-origin, so CORS points at 8000.
      FRONTEND_ORIGIN: http://localhost:8000
      OAUTH_REDIRECT_URI: http://localhost:8000/api/connections/google/callback
    volumes:
      - agentforge_data:/app/backend/data
    restart: unless-stopped

volumes:
  agentforge_data:

